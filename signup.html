<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/assets/css/signup.css" />
  </head>
  <body>
    <div class="sign-up">
        <div class="left">
            <form action="#">
                <h2>Get Started Now</h2>
                <div>
                    <label for="name">Name</label>
                    <input type="text" name="" id="name" placeholder="Enter your name">
                    <label for="email">Email address</label>
                    <input type="email" name="" id="email" placeholder="Enter your email">
                    <label for="password">Password</label>
                    <input type="password" name="" id="password" placeholder="Enter your password">
                </div>
                <input type="checkbox" name="" id="check">
                <label for="check">I agree to the terms & policy</label>

                <input type="submit" value="Signup">

                <span>or</span>

                <button><i class="fa-brands fa-google"></i>Sign in with Google</button>
                <button><i class="fa-brands fa-apple"></i>Sign in with Apple</button>
                <a href="#">Have an account?</a> <a href="#">Sign In</a>
            </form>
        </div>
        <div class="right">
          <img src="/signup-login/assets/img/img.jpg" alt="">
        </div>
    </div>
  </body>
</html>
