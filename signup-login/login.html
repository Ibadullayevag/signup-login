<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./assets/css/login.css" />
  </head>
  <body>
    <div class="sign-up">
        <div class="left">
            <form action="#">
                <h2>Welcome back!</h2>
                <h4>Enter your Credentials to access your account</h4>
                <div class="label-input">
                    
                    <label for="email">Email address</label> <br>
                    <input type="email" name="" id="email" placeholder="Enter your email"> <br>
                    <label for="password">Password</label> <span class="code">forgot password</span><br>
                    <input type="password" name="" id="password" placeholder="Enter your password">
                </div>
                <input type="checkbox" name="" id="check"> 
                <label class="agree" for="check">Remember for 30 days</label>
                <br>

                <input class="upp" type="submit" value="Login">
                <br>

                <div class="span"><span>or</span></div>
                <br>

              <div class="buttons">
                  <button><i class="fa-brands fa-google"></i>Sign in with Google</button>
                <button><i class="fa-brands fa-apple"></i>Sign in with Apple</button>
              </div>
                <br>
               <div class="ateg">
                 <a href="#">Don't have an account?</a> <a href="#">Sign Up</a>
            </form>
               </div>
        </div>
        <div class="right"></div>
    </div>
  </body>
</html>
